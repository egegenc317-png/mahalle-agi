<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dijital Mahallem</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff7ed, #fff);
        color: #292524;
        font-family: system-ui, sans-serif;
      }
      .card {
        max-width: 420px;
        margin: 24px;
        padding: 24px;
        border: 1px solid #fed7aa;
        border-radius: 24px;
        background: rgba(255,255,255,.92);
        box-shadow: 0 10px 40px rgba(249,115,22,.12);
      }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0; line-height: 1.6; color: #57534e; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Dijital Mahallem</h1>
      <p>Şu an bağlantın zayıf görünüyor. İnternet geri geldiğinde uygulama kaldığın yerden devam edecek.</p>
    </div>
  </body>
</html>
